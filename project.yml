# HomeHub — XcodeGen project specification
#
# Generate the Xcode project:
#   brew install xcodegen   (if needed)
#   xcodegen generate
#
# Then open HomeHub.xcodeproj in Xcode.

name: HomeHub

options:
  bundleIdPrefix: cz.keksiczek
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  generateEmptyDirectories: false
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    GENERATE_INFOPLIST_FILE: YES
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  HomeHub:
    type: application
    platform: iOS
    entitlements:
      path: HomeHub/HomeHub.entitlements
      properties:
        com.apple.security.application-groups:
          - group.cz.keksiczek.homehub.shared
    sources:
      - path: HomeHub
    dependencies:
      - framework: /Users/keks/Developer/llama.xcframework
        embed: true
        codeSign: true
      # System frameworks required by llama.cpp's Metal backend.
      # Without explicit linking, the linker emits auto-link-failure warnings
      # for Accelerate (BLAS/vDSP), Metal compute, and CoreAudio.
      - sdk: Accelerate.framework
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: MetalPerformanceShaders.framework
      - sdk: CoreAudio.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cz.keksiczek.homehub
        HEADER_SEARCH_PATHS: "$(inherited) /Users/keks/Developer/llama.xcframework/ios-arm64/Headers"
        OTHER_LDFLAGS: "$(inherited) -lc++"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: >-
          UIInterfaceOrientationPortrait
          UIInterfaceOrientationLandscapeLeft
          UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: >-
          UIInterfaceOrientationPortrait
          UIInterfaceOrientationPortraitUpsideDown
          UIInterfaceOrientationLandscapeLeft
          UIInterfaceOrientationLandscapeRight
        NSMicrophoneUsageDescription: "Potřebujeme mikrofon pro možnost hlasové konverzace offline."
        NSSpeechRecognitionUsageDescription: "Nativní rozpoznávání hovoru pro diktování přes Apple infrastrukturu beze slov mimo zařízení."
        # App uses only standard HTTPS/TLS for model downloads and no custom
        # cryptography — declare exemption so App Store review doesn't flag
        # the build as missing an export-compliance answer. If this changes
        # (e.g. adding non-exempt crypto), remove this key and answer the
        # encryption questionnaire in App Store Connect instead.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) HOMEHUB_REAL_RUNTIME"
        SWIFT_OBJC_BRIDGING_HEADER: "HomeHub/Runtime/Bridge/HomeHub-Bridging-Header.h"
        GCC_PREPROCESSOR_DEFINITIONS: "$(inherited) HOMEHUB_REAL_RUNTIME=1"
        #
        # ─── SwiftData persistence (optional) ────────────────────────────────────
        # Uncomment to replace the JSON FileStore with SwiftData:
        # SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) HOMEHUB_SWIFTDATA"
        #
        # ─────────────────────────────────────────────────────────────────────────
    preCompileScripts: []
    postCompileScripts: []

  HomeHubTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HomeHubTests
    dependencies:
      - target: HomeHub
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cz.keksiczek.homehub.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/HomeHub.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/HomeHub"
        BUNDLE_LOADER: "$(TEST_HOST)"

  HomeHubWidget:
    type: app-extension
    platform: iOS
    entitlements:
      path: HomeHubWidget/HomeHubWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.cz.keksiczek.homehub.shared
    sources:
      - path: HomeHubWidget
    dependencies:
      - target: HomeHub
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cz.keksiczek.homehub.widget
        INFOPLIST_KEY_CFBundleDisplayName: HomeHub
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited)"
