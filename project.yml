# HomeHub — XcodeGen project specification
#
# Generate the Xcode project:
#   brew install xcodegen   (if needed)
#   xcodegen generate
#
# Then open HomeHub.xcodeproj in Xcode.

name: HomeHub

options:
  bundleIdPrefix: com.homehub
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  generateEmptyDirectories: false
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    GENERATE_INFOPLIST_FILE: YES
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  HomeHub:
    type: application
    platform: iOS
    sources:
      - path: HomeHub
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.homehub.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: >-
          UIInterfaceOrientationPortrait
          UIInterfaceOrientationLandscapeLeft
          UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: >-
          UIInterfaceOrientationPortrait
          UIInterfaceOrientationPortraitUpsideDown
          UIInterfaceOrientationLandscapeLeft
          UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: "Potřebujeme kameru k vizuálnímu vstupu chatu."
        NSMicrophoneUsageDescription: "Potřebujeme mikrofon pro možnost hlasové konverzace offline."
        NSSpeechRecognitionUsageDescription: "Nativní rozpoznávání hovoru pro diktování přes Apple infrastrukturu beze slov mimo zařízení."
        NSCalendarsUsageDescription: "Aby ti asistent mohl organizovat paměť a denní agendu."
        NSCalendarsFullAccessUsageDescription: "Získávání a modifikace kalendářových dat lokálním AI."
        NSHomeKitUsageDescription: "Asistent potřebuje přístup k domácnosti pro ovládání světel, zásuveek a čtení ze senzorů."
        NSRemindersFullAccessUsageDescription: "Asistent potřebuje přístup k připomínkám pro vytváření a čtení úkolů."
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited)"
        #
        # ─── Real-runtime device build ────────────────────────────────────────────
        #
        # To build with the real llama.cpp C++ backend, do ALL of the following:
        #
        #  1. Uncomment the three lines below (SWIFT_ACTIVE_COMPILATION_CONDITIONS,
        #     SWIFT_OBJC_BRIDGING_HEADER, GCC_PREPROCESSOR_DEFINITIONS) and comment
        #     out the plain SWIFT_ACTIVE_COMPILATION_CONDITIONS line above.
        #
        #  2. Place the llama.cpp xcframework at:
        #       HomeHub/Runtime/Bridge/llama.xcframework
        #     (add it under Xcode → General → Frameworks, Libraries, Embedded Content)
        #
        #  3. Ensure the bridging header exists at:
        #       HomeHub/Runtime/Bridge/HomeHub-Bridging-Header.h
        #     It must import the llama.cpp C header: #include "llama.h"
        #
        #  4. Run `xcodegen generate` to regenerate the Xcode project, then build for
        #     a physical device. The Simulator is NOT supported (Metal compute shaders).
        #
        #  5. On first install: open Settings → Developer Diagnostics to verify
        #     "C++ Bridge" shows "llama.cpp (HOMEHUB_REAL_RUNTIME set)".
        #     If it shows "Stub", the flag was not picked up — clean build and retry.
        #
        # SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) HOMEHUB_REAL_RUNTIME"
        # SWIFT_OBJC_BRIDGING_HEADER: "HomeHub/Runtime/Bridge/HomeHub-Bridging-Header.h"
        # GCC_PREPROCESSOR_DEFINITIONS: "$(inherited) HOMEHUB_REAL_RUNTIME=1"
        #
        # ─── SwiftData persistence (optional) ────────────────────────────────────
        # Uncomment to replace the JSON FileStore with SwiftData:
        # SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) HOMEHUB_SWIFTDATA"
        #
        # ─────────────────────────────────────────────────────────────────────────
    preCompileScripts: []
    postCompileScripts: []

  HomeHubTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HomeHubTests
    dependencies:
      - target: HomeHub
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.homehub.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/HomeHub.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/HomeHub"
        BUNDLE_LOADER: "$(TEST_HOST)"

  HomeHubWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: HomeHubWidget
    dependencies:
      - target: HomeHub
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.homehub.app.widget
        INFOPLIST_KEY_CFBundleDisplayName: HomeHub
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited)"
