# HomeHub — XcodeGen project specification
#
# Generate the Xcode project:
#   brew install xcodegen   (if needed)
#   xcodegen generate
#
# Then open HomeHub.xcodeproj in Xcode.

name: HomeHub

options:
  bundleIdPrefix: com.homehub
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  generateEmptyDirectories: false
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    GENERATE_INFOPLIST_FILE: YES
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  HomeHub:
    type: application
    platform: iOS
    sources:
      - path: HomeHub
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.homehub.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: >-
          UIInterfaceOrientationPortrait
          UIInterfaceOrientationLandscapeLeft
          UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: >-
          UIInterfaceOrientationPortrait
          UIInterfaceOrientationPortraitUpsideDown
          UIInterfaceOrientationLandscapeLeft
          UIInterfaceOrientationLandscapeRight
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited)"
        # Uncomment to use the real llama.cpp runtime:
        # SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) HOMEHUB_REAL_RUNTIME"
        # SWIFT_OBJC_BRIDGING_HEADER: "HomeHub/Runtime/Bridge/HomeHub-Bridging-Header.h"
        # GCC_PREPROCESSOR_DEFINITIONS: "$(inherited) HOMEHUB_REAL_RUNTIME=1"
    preCompileScripts: []
    postCompileScripts: []

  HomeHubTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HomeHubTests
    dependencies:
      - target: HomeHub
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.homehub.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/HomeHub.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/HomeHub"
        BUNDLE_LOADER: "$(TEST_HOST)"
