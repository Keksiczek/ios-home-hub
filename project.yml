# HomeHub — XcodeGen project specification
#
# Generate the Xcode project:
#   brew install xcodegen   (if needed)
#   xcodegen generate
#
# Then open HomeHub.xcodeproj in Xcode.
#
# ── Runtime backends ──────────────────────────────────────────────────────────
# The primary on-device LLM backend is MLX (mlx-swift / mlx-swift-lm). It has
# no native dependency outside of Swift packages, so default builds compile
# cleanly on a fresh checkout.
#
# llama.cpp is OPTIONAL and OFF by default. To re-enable it:
#   1. Place llama.xcframework as a sibling of the repo root, e.g.:
#        ~/Developer/
#          llama.xcframework/   ← here
#          ios-home-hub/        ← repo root
#   2. Uncomment the lines tagged "[llama.cpp opt-in]" below (the
#      framework dep, framework/header search paths, and the compile flag in
#      both SWIFT_ACTIVE_COMPILATION_CONDITIONS and GCC_PREPROCESSOR_DEFINITIONS).
#   3. Re-run `xcodegen generate`.
# ─────────────────────────────────────────────────────────────────────────────

name: HomeHub

options:
  bundleIdPrefix: cz.keksiczek
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  createIntermediateGroups: true
  generateEmptyDirectories: false

# Explicit shared schemes (committed under
# HomeHub.xcodeproj/xcshareddata/xcschemes/). Without these, a fresh clone has
# no scheme — `xcodebuild -scheme HomeHub` fails until someone opens the
# project in Xcode and lets it autocreate one, which then ends up in
# xcuserdata (per-developer, not committed).
schemes:
  HomeHub:
    build:
      targets:
        HomeHub: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - HomeHubTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  HomeHubWidget:
    build:
      targets:
        HomeHubWidget: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

packages:
  # mlx-swift uses semver; `from: 0.21.0` pins to the latest 0.x compatible
  # release. The committed Package.resolved locks the exact revision so builds
  # are fully reproducible.
  MLX:
    url: https://github.com/ml-explore/mlx-swift
    from: 0.21.0
  MLXLM:
    url: https://github.com/ml-explore/mlx-swift-lm
    branch: main
  # Explicit direct dependency on swift-transformers.
  # HubIntegration.swift imports Hub and Tokenizers unconditionally.
  # Listing the package here (rather than relying on mlx-swift-lm's
  # transitive pull) locks the version and avoids TensorUtils conflicts.
  # from: 0.1.14 is the minimum version that works with WhisperKit 0.11.0.
  SwiftTransformers:
    url: https://github.com/huggingface/swift-transformers
    from: 0.1.14
  # WhisperKit >= 0.11.0 is required. 0.9.x and earlier import TensorUtils
  # as a standalone module from swift-transformers; that module was removed
  # when swift-transformers was restructured into Hub/Tokenizers products.
  # Using 0.9.x with swift-transformers >= 0.1.14 therefore produces
  # "Unable to find module dependency: 'TensorUtils'" at build time.
  # VoiceService.swift gates all WhisperKit usage behind
  # #if canImport(WhisperKit) so the app still compiles if this package is
  # removed; keeping it here enables the on-device STT path.
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: 0.11.0

settings:
  base:
    SWIFT_VERSION: "5.10"
    GENERATE_INFOPLIST_FILE: YES
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  HomeHub:
    type: application
    platform: iOS
    entitlements:
      path: HomeHub/HomeHub.entitlements
      properties:
        com.apple.security.application-groups:
          - group.cz.keksiczek.homehub.shared
    sources:
      - path: HomeHub
    dependencies:
      # ── [llama.cpp opt-in] Binary framework + system frameworks ──────────────
      # Uncomment the next eight lines to re-enable llama.cpp. The framework is
      # not committed; place it as a sibling of the repo root before building.
      # See the file header for the full opt-in checklist.
      #
      # - framework: ../llama.xcframework
      #   embed: true
      #   codeSign: true
      # - sdk: Accelerate.framework
      # - sdk: Metal.framework
      # - sdk: MetalKit.framework
      # - sdk: MetalPerformanceShaders.framework
      # - sdk: CoreAudio.framework
      #
      # ── Swift Package dependencies ────────────────────────────────────────────
      - package: MLX
        product: MLX
      - package: MLX
        product: MLXNN
      - package: MLXLM
        product: MLXLLM
      - package: MLXLM
        product: MLXLMCommon
      # Hub + Tokenizers for HubIntegration.swift (direct imports, not via Transformers).
      - package: SwiftTransformers
        product: Hub
      - package: SwiftTransformers
        product: Tokenizers
      # WhisperKit for VoiceService.swift on-device STT.
      - package: WhisperKit
        product: WhisperKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cz.keksiczek.homehub
        # ── [llama.cpp opt-in] Search paths and link flags ─────────────────────
        # Uncomment when re-enabling llama.cpp. Without this, the bridging
        # header skips <llama.h> and the Swift sources skip the llama_* call
        # sites, so default builds need none of these.
        #
        # FRAMEWORK_SEARCH_PATHS: "$(inherited) $(SRCROOT)/.."
        # HEADER_SEARCH_PATHS: "$(inherited) $(SRCROOT)/../llama.xcframework/ios-arm64/Headers"
        # OTHER_LDFLAGS: "$(inherited) -lc++"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: >-
          UIInterfaceOrientationPortrait
          UIInterfaceOrientationLandscapeLeft
          UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: >-
          UIInterfaceOrientationPortrait
          UIInterfaceOrientationPortraitUpsideDown
          UIInterfaceOrientationLandscapeLeft
          UIInterfaceOrientationLandscapeRight
        NSMicrophoneUsageDescription: "Potřebujeme mikrofon pro možnost hlasové konverzace offline."
        NSSpeechRecognitionUsageDescription: "Nativní rozpoznávání hovoru pro diktování přes Apple infrastrukturu beze slov mimo zařízení."
        # App uses only standard HTTPS/TLS for model downloads and no custom
        # cryptography — declare exemption so App Store review doesn't flag
        # the build as missing an export-compliance answer. If this changes
        # (e.g. adding non-exempt crypto), remove this key and answer the
        # encryption questionnaire in App Store Connect instead.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        # The bridging header is intentionally kept even when llama.cpp is OFF:
        # it sits behind `#ifdef HOMEHUB_LLAMA_RUNTIME` so the C preprocessor
        # produces an empty translation unit by default. Removing the path
        # entirely would require a project regen on every flag flip.
        SWIFT_OBJC_BRIDGING_HEADER: "HomeHub/Runtime/Bridge/HomeHub-Bridging-Header.h"
        # ── [llama.cpp opt-in] Compile flag ────────────────────────────────────
        # Uncomment BOTH lines to enable llama.cpp. The flag must be visible to
        # the Swift sources (SWIFT_ACTIVE_COMPILATION_CONDITIONS) AND to the
        # bridging header / C++ side (GCC_PREPROCESSOR_DEFINITIONS) — otherwise
        # one side calls llama_* symbols the other side hasn't included.
        #
        # SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) HOMEHUB_LLAMA_RUNTIME"
        # GCC_PREPROCESSOR_DEFINITIONS: "$(inherited) HOMEHUB_LLAMA_RUNTIME=1"
        #
        # ─── SwiftData persistence (optional) ────────────────────────────────────
        # Uncomment to replace the JSON FileStore with SwiftData:
        # SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) HOMEHUB_SWIFTDATA"
        #
        # ─────────────────────────────────────────────────────────────────────────

  HomeHubTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HomeHubTests
    dependencies:
      - target: HomeHub
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cz.keksiczek.homehub.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/HomeHub.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/HomeHub"
        BUNDLE_LOADER: "$(TEST_HOST)"

  HomeHubWidget:
    type: app-extension
    platform: iOS
    entitlements:
      path: HomeHubWidget/HomeHubWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.cz.keksiczek.homehub.shared
    sources:
      - path: HomeHubWidget
    dependencies:
      - target: HomeHub
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cz.keksiczek.homehub.widget
        INFOPLIST_KEY_CFBundleDisplayName: HomeHub
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited)"
